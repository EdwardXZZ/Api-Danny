<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <link rel="icon" href="/src/icon.png" type="image/png">
    <title id="pageTitle">API Alya · Plataforma Profesional</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: #0f172a;
            background: linear-gradient(145deg, #f1f5f9 0%, #eef2ff 100%);
            overflow-x: hidden;
        }

        body.no-scroll {
            overflow: hidden;
        }

        /* Loading Screen */
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #loadingScreen.fade-out {
            opacity: 0;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #f43f5e;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 20px;
            color: #94a3b8;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* Music Player Flotante - Versión Premium */
        .music-player {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 340px;
            background: rgba(15,23,42,0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 16px;
            z-index: 10000;
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.35);
            border: 1px solid rgba(244,63,94,0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .music-player:hover {
            border-color: #f43f5e;
            transform: translateY(-2px);
        }

        .music-player.minimized {
            width: 56px;
            padding: 12px;
            border-radius: 28px;
        }

        .music-player.minimized .music-info,
        .music-player.minimized .music-controls,
        .music-player.minimized .progress-container,
        .music-player.minimized .time-info {
            display: none;
        }

        .music-player.minimized .music-toggle-min {
            transform: rotate(180deg);
        }

        .music-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            color: #f8fafc;
        }

        .music-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
        }

        .music-toggle-min {
            background: rgba(255,255,255,0.08);
            border: none;
            color: #f8fafc;
            cursor: pointer;
            font-size: 16px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .music-toggle-min:hover {
            background: #f43f5e;
            transform: scale(1.05);
        }

        .music-info {
            text-align: center;
            margin-bottom: 12px;
        }

        .song-name {
            color: #f8fafc;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .artist-name {
            color: rgba(248,250,252,0.6);
            font-size: 11px;
        }

        .progress-container {
            background: rgba(255,255,255,0.12);
            border-radius: 20px;
            height: 4px;
            margin: 12px 0;
            cursor: pointer;
        }

        .progress-bar {
            background: linear-gradient(90deg, #f43f5e, #fb923c);
            border-radius: 20px;
            height: 100%;
            width: 0%;
            transition: width 0.05s linear;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            color: rgba(248,250,252,0.5);
            font-size: 9px;
            margin-bottom: 12px;
        }

        .music-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
        }

        .control-btn {
            background: rgba(255,255,255,0.08);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #f8fafc;
            font-size: 14px;
        }

        .control-btn:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.08);
        }

        .control-btn.play-btn {
            background: linear-gradient(135deg, #f43f5e, #e11d48);
            width: 48px;
            height: 48px;
            font-size: 18px;
        }

        .control-btn.play-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 15px rgba(244,63,94,0.5);
        }

        /* Top Bar */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            z-index: 1000;
            transition: all 0.2s;
        }

        .top-bar.scrolled {
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .menu-toggle {
            width: 44px;
            height: 44px;
            background: #f1f5f9;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            border-radius: 14px;
            transition: all 0.2s;
        }

        .menu-toggle:hover {
            background: #e2e8f0;
        }

        .menu-toggle span {
            display: block;
            width: 20px;
            height: 2px;
            background: #1e293b;
            transition: all 0.3s;
            border-radius: 2px;
        }

        .menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        .menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        .api-name {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #f43f5e, #f97316);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .top-links {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .top-link {
            color: #475569;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .top-link:hover {
            color: #f43f5e;
        }

        .link-icon {
            width: 16px;
            height: 16px;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            top: 64px;
            left: -300px;
            width: 300px;
            height: calc(100vh - 64px);
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(12px);
            border-right: 1px solid #e2e8f0;
            overflow-y: auto;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 999;
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar-overlay {
            position: fixed;
            top: 64px;
            left: 0;
            width: 100%;
            height: calc(100vh - 64px);
            background: rgba(0,0,0,0.4);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 998;
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .sidebar-nav {
            padding: 20px 0;
        }

        .sidebar-item {
            padding: 12px 28px;
            color: #334155;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            font-size: 14px;
            font-weight: 500;
        }

        .sidebar-item:hover {
            background: #f8fafc;
            color: #f43f5e;
        }

        .sidebar-item.active {
            background: #fef2f2;
            border-left-color: #f43f5e;
            color: #f43f5e;
        }

        .sidebar-category {
            padding: 20px 28px 8px;
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Main Content */
        .main-content {
            margin-top: 64px;
            padding: 40px 32px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
            min-height: calc(100vh - 120px);
        }

        /* Home Page */
        .home-banner {
            text-align: center;
            padding: 60px 20px;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .home-banner img {
            max-width: 100%;
            height: auto;
            border-radius: 28px;
            margin-bottom: 32px;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.15);
        }

        .home-title {
            font-size: 56px;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #0f172a, #334155);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -1px;
        }

        .home-version {
            display: inline-block;
            background: linear-gradient(135deg, #f43f5e, #e11d48);
            color: #ffffff;
            padding: 6px 20px;
            border-radius: 60px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 28px;
            box-shadow: 0 4px 12px rgba(244,63,94,0.3);
        }

        .home-description {
            font-size: 18px;
            color: #64748b;
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        /* Status Page */
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 30px;
            animation: fadeInUp 0.6s ease;
        }

        .status-card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(10px);
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            padding: 24px;
            transition: all 0.3s;
        }

        .status-card:hover {
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            transform: translateY(-3px);
            border-color: #f43f5e;
        }

        .status-card-title {
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .status-card-value {
            font-size: 36px;
            font-weight: 800;
            color: #0f172a;
        }

        .status-card-small {
            font-size: 12px;
            color: #64748b;
            margin-top: 6px;
        }

        /* Endpoints Page */
        .search-box {
            margin-bottom: 36px;
            animation: fadeInUp 0.6s ease;
        }

        .search-input {
            width: 100%;
            padding: 14px 24px;
            border: 1px solid #e2e8f0;
            border-radius: 60px;
            font-size: 15px;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .search-input:focus {
            outline: none;
            border-color: #f43f5e;
            box-shadow: 0 0 0 4px rgba(244,63,94,0.1);
        }

        .category-section {
            margin-bottom: 56px;
            animation: fadeInUp 0.6s ease;
        }

        .category-title {
            font-size: 26px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e2e8f0;
        }

        .endpoints-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 20px;
        }

        .endpoint-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .endpoint-card:hover {
            box-shadow: 0 12px 28px -8px rgba(0,0,0,0.1);
            transform: translateY(-3px);
            border-color: #f43f5e;
        }

        .endpoint-info {
            flex: 1;
            min-width: 0;
        }

        .endpoint-name {
            font-size: 16px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 6px;
        }

        .endpoint-desc {
            font-size: 12px;
            color: #64748b;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .endpoint-btn {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #ffffff;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            margin-left: 15px;
        }

        .endpoint-btn:hover {
            background: linear-gradient(135deg, #f43f5e, #e11d48);
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(244,63,94,0.3);
        }

        /* Modal */
        .modal-content {
            border: none;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow: hidden;
        }

        .modal-header {
            border-bottom: 1px solid #e2e8f0;
            padding: 24px 28px;
            background: white;
        }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
            color: #0f172a;
        }

        .modal-desc {
            font-size: 13px;
            color: #64748b;
            margin-top: 6px;
        }

        .modal-body {
            padding: 28px;
        }

        .modal-footer {
            border-top: 1px solid #e2e8f0;
            padding: 20px 28px;
            background: #f8fafc;
        }

        .api-endpoint-box {
            background: #f1f5f9;
            padding: 14px;
            border-radius: 16px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 12px;
            color: #f43f5e;
            word-break: break-all;
            margin-bottom: 24px;
            border: 1px solid #e2e8f0;
        }

        .param-input {
            width: 100%;
            padding: 14px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            font-size: 14px;
            margin-bottom: 16px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }

        .param-input:focus {
            outline: none;
            border-color: #f43f5e;
            box-shadow: 0 0 0 3px rgba(244,63,94,0.1);
        }

        .param-input.is-invalid {
            border-color: #dc3545;
        }

        .inner-desc {
            font-size: 12px;
            color: #64748b;
            margin-top: 8px;
            line-height: 1.6;
            background: #f8fafc;
            padding: 12px;
            border-radius: 12px;
        }

        .submit-btn {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #ffffff;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            background: linear-gradient(135deg, #f43f5e, #e11d48);
            transform: scale(1.02);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .response-box {
            background: #0f172a;
            padding: 20px;
            border-radius: 16px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 12px;
            color: #a5f3c3;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 450px;
            overflow-y: auto;
            margin-top: 24px;
        }

        .response-image {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            margin-top: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 32px 20px;
            color: #94a3b8;
            font-size: 13px;
            border-top: 1px solid #e2e8f0;
            margin-top: 40px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .top-links {
                display: none;
            }

            .home-title {
                font-size: 32px;
            }

            .home-description {
                font-size: 14px;
            }

            .endpoints-grid {
                grid-template-columns: 1fr;
            }

            .main-content {
                padding: 20px 16px;
            }

            .music-player {
                width: 300px;
                bottom: 16px;
                right: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen">
        <div class="loader"></div>
        <p class="loading-text">CARGANDO PLATAFORMA</p>
    </div>

    <!-- Reproductor de Música Flotante Premium -->
    <div class="music-player" id="musicPlayer">
        <div class="music-header">
            <span class="music-title"><i class="fas fa-headphones me-1"></i> LYONN RADIO</span>
            <button class="music-toggle-min" id="toggleMinimize">−</button>
        </div>
        <div class="music-info">
            <div class="song-name" id="songName">Cargando...</div>
            <div class="artist-name" id="artistName">---</div>
        </div>
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="time-info">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
        </div>
        <div class="music-controls">
            <button class="control-btn" id="prevBtn"><i class="fas fa-backward"></i></button>
            <button class="control-btn play-btn" id="playPauseBtn"><i class="fas fa-play"></i></button>
            <button class="control-btn" id="nextBtn"><i class="fas fa-forward"></i></button>
        </div>
    </div>

    <audio id="audioPlayer" style="display: none;"></audio>

    <!-- Top Bar -->
    <div class="top-bar">
        <div class="top-bar-left">
            <button class="menu-toggle" id="menuToggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="api-name" id="apiName"></div>
        </div>
        <div class="top-bar-right">
            <div class="top-links" id="topLinks"></div>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-nav">
            <div class="sidebar-item active" data-page="home"><i class="fas fa-home me-2"></i> Inicio</div>
            <div class="sidebar-item" data-page="status"><i class="fas fa-chart-line me-2"></i> Estado</div>
            <div class="sidebar-category"><i class="fas fa-tag me-2"></i> Categorías</div>
            <div id="categoriesNav"></div>
            <div class="sidebar-item" data-page="all"><i class="fas fa-cubes me-2"></i> Todos los Endpoints</div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content" id="mainContent"></div>

    <!-- Footer -->
    <div class="footer">
        <p id="footerText"></p>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="apiModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <div>
                        <h5 class="modal-title" id="modalTitle"></h5>
                        <p class="modal-desc" id="modalDesc"></p>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="api-endpoint-box" id="endpointBox" style="display: none;"></div>
                    <div id="paramsContainer"></div>
                    <div id="loadingContainer" style="display: none; text-align: center; padding: 40px;">
                        <div class="loader" style="width: 40px; height: 40px;"></div>
                    </div>
                    <div id="responseContainer"></div>
                </div>
                <div class="modal-footer">
                    <button class="submit-btn" id="submitBtn" style="display: none;"><i class="fas fa-paper-plane me-2"></i> Ejecutar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ============ REPRODUCTOR DE MÚSICA PREMIUM ============
        const playlist = [
            { name: "Latin Lover", artist: "Neutro Shorty, Big Soto", url: "https://raw.githubusercontent.com/JTxs00/uploads/main/1775936364197.mpeg" },
            { name: "El La Engaño Lambada", artist: "Natusha", url: "https://raw.githubusercontent.com/JTxs00/uploads/main/1775936787983.mpeg" },
            { name: "Quédate", artist: "Belee", url: "https://raw.githubusercontent.com/JTxs00/uploads/main/1775936643238.mpeg" },
            { name: "Odisea", artist: "Ozuna", url: "https://raw.githubusercontent.com/JTxs00/uploads/main/1775935979163.mpeg" },
            { name: "Maquiavélico", artist: "Cancerbero", url: "https://raw.githubusercontent.com/JTxs00/uploads/main/1775936827892.mpeg" },
            { name: "Eoo", artist: "Bad Bunny", url: "https://raw.githubusercontent.com/JTxs00/uploads/main/1775936322243.mpeg" },
            { name: "Los Viejos Me Llaman", artist: "No Name", url: "https://raw.githubusercontent.com/JTxs00/uploads/main/1775936897844.mpeg" },
            { name: "Ninfómana", artist: "Jossimar ft El Apóstol", url: "https://raw.githubusercontent.com/JTxs00/uploads/main/1775936920447.mpeg" }
        ];

        let currentSongIndex = 0;
        let isPlaying = false;
        let isMinimized = false;

        const audio = document.getElementById('audioPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const songNameEl = document.getElementById('songName');
        const artistNameEl = document.getElementById('artistName');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const toggleMinimize = document.getElementById('toggleMinimize');
        const musicPlayer = document.getElementById('musicPlayer');

        function loadSong(index) {
            const song = playlist[index];
            songNameEl.textContent = song.name;
            artistNameEl.textContent = song.artist;
            audio.src = song.url;
            audio.load();
            if (isPlaying) {
                audio.play().catch(e => console.log('Error playing:', e));
            }
            updatePlayPauseIcon();
        }

        function updatePlayPauseIcon() {
            const icon = playPauseBtn.querySelector('i');
            if (isPlaying) {
                icon.className = 'fas fa-pause';
            } else {
                icon.className = 'fas fa-play';
            }
        }

        function playPause() {
            if (isPlaying) {
                audio.pause();
            } else {
                audio.play().catch(e => console.log('Error playing:', e));
            }
            isPlaying = !isPlaying;
            updatePlayPauseIcon();
        }

        function nextSong() {
            currentSongIndex = (currentSongIndex + 1) % playlist.length;
            loadSong(currentSongIndex);
            if (!isPlaying) {
                playPause();
            }
        }

        function prevSong() {
            currentSongIndex = (currentSongIndex - 1 + playlist.length) % playlist.length;
            loadSong(currentSongIndex);
            if (!isPlaying) {
                playPause();
            }
        }

        function updateProgress() {
            if (audio.duration && !isNaN(audio.duration)) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = `${percent}%`;
                currentTimeEl.textContent = formatTime(audio.currentTime);
                durationEl.textContent = formatTime(audio.duration);
            }
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function setProgress(e) {
            const rect = progressContainer.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
        }

        function toggleMinimizePlayer() {
            isMinimized = !isMinimized;
            if (isMinimized) {
                musicPlayer.classList.add('minimized');
                toggleMinimize.innerHTML = '+';
            } else {
                musicPlayer.classList.remove('minimized');
                toggleMinimize.innerHTML = '−';
            }
        }

        playPauseBtn.addEventListener('click', playPause);
        nextBtn.addEventListener('click', nextSong);
        prevBtn.addEventListener('click', prevSong);
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('ended', nextSong);
        progressContainer.addEventListener('click', setProgress);
        toggleMinimize.addEventListener('click', toggleMinimizePlayer);

        loadSong(0);

        // ============ API DASHBOARD ORIGINAL ============
        let settings = {};
        let currentPage = 'home';

        document.addEventListener('DOMContentLoaded', async () => {
            await loadSettings();
            initializeUI();
            renderPage('home');
            hideLoading();
        });

        async function loadSettings() {
            try {
                const response = await fetch('/src/settings.json');
                settings = await response.json();

                document.getElementById('pageTitle').textContent = settings.name || 'API Alya';
                document.getElementById('apiName').textContent = settings.name || 'API Alya';
                document.getElementById('footerText').innerHTML = `<i class="fas fa-crown me-1"></i> Creado por ${settings.apiSettings?.creator || 'Lyonn'} <i class="fas fa-crown ms-1"></i>`;

                const topLinksContainer = document.getElementById('topLinks');
                if (settings.links && settings.links.length > 0) {
                    settings.links.forEach(link => {
                        const a = document.createElement('a');
                        a.href = link.url;
                        a.className = 'top-link';
                        a.target = '_blank';
                        a.innerHTML = `
                            <svg class="link-icon" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M11 3a1 1 0 100 2h2.586l-6.293 6.293a1 1 0 101.414 1.414L15 6.414V9a1 1 0 102 0V4a1 1 0 00-1-1h-5z"></path>
                                <path d="M5 5a2 2 0 00-2 2v8a2 2 0 002 2h8a2 2 0 002-2v-3a1 1 0 10-2 0v3H5V7h3a1 1 0 000-2H5z"></path>
                            </svg>
                            ${link.name}
                        `;
                        topLinksContainer.appendChild(a);
                    });
                }

                const categoriesNav = document.getElementById('categoriesNav');
                if (settings.categories) {
                    settings.categories.forEach(category => {
                        const item = document.createElement('div');
                        item.className = 'sidebar-item';
                        item.dataset.page = 'category';
                        item.dataset.category = category.name;
                        item.innerHTML = `<i class="fas fa-folder me-2"></i> ${category.name}`;
                        categoriesNav.appendChild(item);
                    });
                }
            } catch (error) {
                console.error('Error loading settings:', error);
            }
        }

        function initializeUI() {
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');

            menuToggle.addEventListener('click', () => {
                menuToggle.classList.toggle('active');
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
            });

            overlay.addEventListener('click', () => {
                menuToggle.classList.remove('active');
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            });

            document.querySelectorAll('.sidebar-item').forEach(item => {
                item.addEventListener('click', () => {
                    const page = item.dataset.page;
                    const category = item.dataset.category;

                    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');

                    if (page === 'category') {
                        renderPage('category', category);
                    } else {
                        renderPage(page);
                    }

                    menuToggle.classList.remove('active');
                    sidebar.classList.remove('active');
                    overlay.classList.remove('active');
                });
            });

            window.addEventListener('scroll', () => {
                const topBar = document.querySelector('.top-bar');
                if (window.scrollY > 0) {
                    topBar.classList.add('scrolled');
                } else {
                    topBar.classList.remove('scrolled');
                }
            });
        }

        function renderPage(page, category = null) {
            currentPage = page;
            const content = document.getElementById('mainContent');

            switch (page) {
                case 'home':
                    renderHomePage(content);
                    break;
                case 'status':
                    renderStatusPage(content);
                    break;
                case 'category':
                    renderCategoryPage(content, category);
                    break;
                case 'all':
                    renderAllEndpoints(content);
                    break;
            }
        }

        function renderHomePage(container) {
            const imageSrc = Array.isArray(settings.header.imageSrc) && settings.header.imageSrc.length > 0
                ? settings.header.imageSrc[Math.floor(Math.random() * settings.header.imageSrc.length)]
                : '';

            container.innerHTML = `
                <div class="home-banner">
                    ${imageSrc ? `<img src="${imageSrc}" alt="${settings.name}" style="max-width: ${settings.header.imageSize?.desktop || '40%'}">` : ''}
                    <h1 class="home-title">${settings.name || 'API Alya'}</h1>
                    <div class="home-version">${settings.version || 'v1.0'}</div>
                    <p class="home-description">${settings.description || 'Documentación profesional de API'}</p>
                </div>
            `;
        }

        async function renderStatusPage(container) {
            container.innerHTML = '<div style="text-align: center; padding: 40px;"><div class="loader" style="width: 40px; height: 40px;"></div></div>';

            try {
                const response = await fetch('/status');
                const data = await response.json();

                container.innerHTML = `
                    <h2 style="font-size: 32px; font-weight: 700; margin-bottom: 32px;"><i class="fas fa-chart-line me-2"></i> Estado del API</h2>
                    <div class="status-grid">
                        <div class="status-card"><div class="status-card-title">Estado</div><div class="status-card-value" style="color: #10b981;">Online</div></div>
                        <div class="status-card"><div class="status-card-title">Versión</div><div class="status-card-value">${settings.version || 'N/A'}</div></div>
                        <div class="status-card"><div class="status-card-title">Peticiones Totales</div><div class="status-card-value">${data.total_requests || 0}</div></div>
                        <div class="status-card"><div class="status-card-title">Usuarios Activos</div><div class="status-card-value">${data.active_users || 0}</div></div>
                        <div class="status-card"><div class="status-card-title">Límite Diario</div><div class="status-card-value">${data.daily_limit || 'N/A'}</div></div>
                        <div class="status-card"><div class="status-card-title">Rutas Cargadas</div><div class="status-card-value">${data.routes_loaded || 0}</div></div>
                        <div class="status-card"><div class="status-card-title">Tiempo Activo</div><div class="status-card-value">${formatUptime(data.uptime_seconds)}</div></div>
                        <div class="status-card"><div class="status-card-title">Latencia</div><div class="status-card-value">${data.api_latency_ms || 0}ms</div></div>
                        <div class="status-card"><div class="status-card-title">CPU Núcleos</div><div class="status-card-value">${data.system?.cores || 'N/A'}</div><div class="status-card-small">${data.system?.cpu_model || ''}</div></div>
                        <div class="status-card"><div class="status-card-title">CPU</div><div class="status-card-value">${data.system?.cpu_load_percent || 0}%</div></div>
                        <div class="status-card"><div class="status-card-title">RAM</div><div class="status-card-value">${data.system?.ram_used_gb || 0} GB</div><div class="status-card-small">de ${data.system?.ram_total_gb || 0} GB</div></div>
                        <div class="status-card"><div class="status-card-title">Disco</div><div class="status-card-value">${data.system?.disk_used_gb || 0} GB</div><div class="status-card-small">de ${data.system?.disk_total_gb || 0} GB</div></div>
                    </div>
                `;
            } catch (error) {
                container.innerHTML = '<p style="text-align: center; color: #dc3545;">Error al cargar el estado</p>';
            }
        }

        function renderCategoryPage(container, categoryName) {
            const category = settings.categories.find(c => c.name === categoryName);
            if (!category) return;

            const sortedItems = [...category.items].sort((a, b) => a.name.localeCompare(b.name));

            container.innerHTML = `
                <div class="search-box">
                    <input type="text" class="search-input" placeholder="🔍 Buscar endpoints..." id="searchInput">
                </div>
                <div class="category-section">
                    <h2 class="category-title"><i class="fas fa-folder-open me-2"></i> ${category.name}</h2>
                    <div class="endpoints-grid" id="endpointsGrid">
                        ${sortedItems.map(item => createEndpointCard(item)).join('')}
                    </div>
                </div>
            `;

            setupSearch();
            setupEndpointButtons();
        }

        function renderAllEndpoints(container) {
            container.innerHTML = `
                <div class="search-box">
                    <input type="text" class="search-input" placeholder="🔍 Buscar endpoints..." id="searchInput">
                </div>
                <div id="allCategories"></div>
            `;

            const allCategories = document.getElementById('allCategories');
            settings.categories.forEach(category => {
                const sortedItems = [...category.items].sort((a, b) => a.name.localeCompare(b.name));

                allCategories.innerHTML += `
                    <div class="category-section" data-category="${category.name}">
                        <h2 class="category-title"><i class="fas fa-cube me-2"></i> ${category.name}</h2>
                        <div class="endpoints-grid">
                            ${sortedItems.map(item => createEndpointCard(item)).join('')}
                        </div>
                    </div>
                `;
            });

            setupSearch();
            setupEndpointButtons();
        }

        function createEndpointCard(item) {
            return `
                <div class="endpoint-card" data-name="${item.name.toLowerCase()}" data-desc="${item.desc.toLowerCase()}">
                    <div class="endpoint-info">
                        <div class="endpoint-name"><i class="fas fa-code me-2"></i> ${item.name}</div>
                        <div class="endpoint-desc">${item.desc}</div>
                    </div>
                    <button class="endpoint-btn" data-path="${item.path}" data-name="${item.name}" data-desc="${item.desc}" data-inner-desc="${item.innerDesc || ''}">
                        GET <i class="fas fa-arrow-right ms-1"></i>
                    </button>
                </div>
            `;
        }

        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            if (!searchInput) return;

            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const cards = document.querySelectorAll('.endpoint-card');
                const sections = document.querySelectorAll('.category-section');

                cards.forEach(card => {
                    const name = card.dataset.name;
                    const desc = card.dataset.desc;
                    const matches = name.includes(term) || desc.includes(term);
                    card.style.display = matches ? '' : 'none';
                });

                sections.forEach(section => {
                    const visibleCards = section.querySelectorAll('.endpoint-card:not([style*="display: none"])');
                    section.style.display = visibleCards.length > 0 ? '' : 'none';
                });
            });
        }

        function setupEndpointButtons() {
            document.querySelectorAll('.endpoint-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const path = btn.dataset.path;
                    const name = btn.dataset.name;
                    const desc = btn.dataset.desc;
                    const innerDesc = btn.dataset.innerDesc;

                    openModal(path, name, desc, innerDesc);
                });
            });
        }

        function openModal(path, name, desc, innerDesc) {
            const modal = new bootstrap.Modal(document.getElementById('apiModal'));

            document.getElementById('modalTitle').textContent = name;
            document.getElementById('modalDesc').textContent = desc;
            document.getElementById('endpointBox').style.display = 'none';
            document.getElementById('paramsContainer').innerHTML = '';
            document.getElementById('responseContainer').innerHTML = '';
            document.getElementById('submitBtn').style.display = 'none';

            const baseUrl = window.location.origin + path;
            const urlParts = path.split('?');
            const params = new URLSearchParams(urlParts[1] || '');
            const hasParams = Array.from(params.keys()).length > 0;

            if (hasParams) {
                const paramsContainer = document.getElementById('paramsContainer');

                Array.from(params.keys()).forEach(param => {
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.className = 'param-input';
                    input.placeholder = `Ingresa ${param}...`;
                    input.dataset.param = param;
                    input.required = true;
                    paramsContainer.appendChild(input);
                });

                if (innerDesc) {
                    const descDiv = document.createElement('div');
                    descDiv.className = 'inner-desc';
                    descDiv.innerHTML = `<i class="fas fa-info-circle me-1"></i> ${innerDesc.replace(/\n/g, '<br>')}`;
                    paramsContainer.appendChild(descDiv);
                }

                const submitBtn = document.getElementById('submitBtn');
                submitBtn.style.display = 'block';
                submitBtn.disabled = true;

                paramsContainer.querySelectorAll('.param-input').forEach(input => {
                    input.addEventListener('input', () => {
                        const allInputs = paramsContainer.querySelectorAll('.param-input');
                        const allFilled = Array.from(allInputs).every(inp => inp.value.trim() !== '');
                        submitBtn.disabled = !allFilled;
                    });
                });

                submitBtn.onclick = () => {
                    const inputs = paramsContainer.querySelectorAll('.param-input');
                    const newParams = new URLSearchParams();
                    let isValid = true;

                    inputs.forEach(input => {
                        if (!input.value.trim()) {
                            isValid = false;
                            input.classList.add('is-invalid');
                        } else {
                            input.classList.remove('is-invalid');
                            newParams.append(input.dataset.param, input.value.trim());
                        }
                    });

                    if (!isValid) return;

                    const fullUrl = `${window.location.origin}${urlParts[0]}?${newParams.toString()}`;
                    paramsContainer.innerHTML = '';
                    submitBtn.style.display = 'none';
                    makeApiRequest(fullUrl);
                };
            } else {
                makeApiRequest(baseUrl);
            }

            modal.show();
        }

        async function makeApiRequest(url) {
            const endpointBox = document.getElementById('endpointBox');
            const loadingContainer = document.getElementById('loadingContainer');
            const responseContainer = document.getElementById('responseContainer');

            endpointBox.textContent = url;
            endpointBox.style.display = 'block';
            loadingContainer.style.display = 'block';
            responseContainer.innerHTML = '';

            try {
                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const contentType = response.headers.get('Content-Type');

                if (contentType && contentType.startsWith('image/')) {
                    const blob = await response.blob();
                    const imageUrl = URL.createObjectURL(blob);

                    const img = document.createElement('img');
                    img.src = imageUrl;
                    img.className = 'response-image';
                    responseContainer.appendChild(img);
                } else {
                    const data = await response.json();
                    const pre = document.createElement('pre');
                    pre.className = 'response-box';
                    pre.textContent = JSON.stringify(data, null, 2);
                    responseContainer.appendChild(pre);
                }
            } catch (error) {
                const pre = document.createElement('pre');
                pre.className = 'response-box';
                pre.textContent = `Error: ${error.message}`;
                pre.style.color = '#f87171';
                responseContainer.appendChild(pre);
            } finally {
                loadingContainer.style.display = 'none';
            }
        }

        function formatUptime(seconds) {
            if (!seconds) return 'N/A';
            const days = Math.floor(seconds / 86400);
            const hours = Math.floor((seconds % 86400) / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            if (days > 0) return `${days}d ${hours}h`;
            if (hours > 0) return `${hours}h ${minutes}m`;
            return `${minutes}m`;
        }

        function hideLoading() {
            const loadingScreen = document.getElementById('loadingScreen');
            loadingScreen.classList.add('fade-out');
            setTimeout(() => {
                loadingScreen.style.display = 'none';
                document.body.classList.remove('no-scroll');
            }, 600);
        }
    </script>
</body>
</html>
